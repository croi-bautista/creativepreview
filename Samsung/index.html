<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Banner 970x250</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="banner">

    <!-- LEFT: Video -->
    <div class="video-wrap">
      <video id="bannerVideo" autoplay muted loop playsinline>
        <source src="assets/video.mp4" type="video/mp4">
      </video>
    </div>

    <!-- RIGHT: Static two-column content -->
      <div class="static">
        <div class="col col-left">
          <!-- left column content -->
          <img src="assets/samsung-logo.png" class="logo" alt="Samsung">

          <div class="headline">
              <span style="font-family: samsungsharpsansBold;">The AI companion</span>
              that's always
              one step ahead.
          </div>

          <!-- <a href="#" class="cta"> Buy now </a> -->
          <div class="cta">Buy now </div>

        </div>

        <div class="col col-right">
          <!-- Replace each placeholder with your final image later. -->
          <div class="image-slider" aria-label="Product image slider">
            <div class="slider-track">
              <div class="slider-slide is-active">
                <img src="assets/img1.png" alt="Product image 1">
              </div>
              <div class="slider-slide">
                <img src="assets/img2.png" alt="Product image 2">
              </div>
              <div class="slider-slide">
                <img src="assets/img3.png" alt="Product image 3">
              </div>
              <div class="slider-slide">
                <img src="assets/img4.png" alt="Product image 4">
              </div>
              <div class="slider-slide">
                <img src="assets/img5.png" alt="Product image 5">
              </div>
            </div>

            <div class="slider-controls">
              <button class="slider-btn slider-btn-prev" type="button" aria-label="Previous image">
                &#8249;
              </button>
              <button class="slider-btn slider-btn-next" type="button" aria-label="Next image">
                &#8250;
              </button>
            </div>

            <div class="slider-dots" aria-label="Choose image">
              <button class="slider-dot is-active" type="button" aria-label="Show image 1"></button>
              <button class="slider-dot" type="button" aria-label="Show image 2"></button>
              <button class="slider-dot" type="button" aria-label="Show image 3"></button>
              <button class="slider-dot" type="button" aria-label="Show image 4"></button>
              <button class="slider-dot" type="button" aria-label="Show image 5"></button>
            </div>
          </div>
          <div class="productImage2">
            <img src="assets/product-image2.png" alt="Product Image 2">
          </div>

          <div class="productImage1">
            <img src="assets/product-image1.png" alt="Product Image 1">
          </div>
        </div>
      </div>
      
    </div>    
    

  

  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="banner.js"></script>
</body>
</html>
